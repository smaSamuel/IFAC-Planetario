services:

  web:
    build: ./docker/php
    container_name: planetario_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-planetario}
      - DB_USER=${DB_USER:-planetario_user}
      - DB_PASS=${DB_PASS:-secret}
    networks:
      - planetario_net

  db:
    image: mariadb:11
    container_name: planetario_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-rootsecret}
      - MYSQL_DATABASE=${DB_NAME:-planetario}
      - MYSQL_USER=${DB_USER:-planetario_user}
      - MYSQL_PASSWORD=${DB_PASS:-secret}
    networks:
      - planetario_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: planetario_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-rootsecret}
    depends_on:
      - db
    networks:
      - planetario_net

volumes:
  db_data:

networks:
  planetario_net:
    driver: bridge
